{% extends "base.html" %}
{% block content %}

<div style="height: 100vh; display: flex; flex-direction: column;">

  <!-- ════════════════════════════════════════ -->
  <!--  BARRA SUPERIOR                         -->
  <!-- ════════════════════════════════════════ -->
  <div id="topbar">

    <!-- Botões de filtro: Linha e Tipo -->
    <div class="btn-group btn-group-sm">
      <button class="btn btn-outline-info filtro-btn active"
              data-filtro="linha"
              title="Filtrar por Linha">
        ≡ Linha
      </button>
      <button class="btn btn-outline-light filtro-btn"
              data-filtro="tipo"
              title="Filtrar por Tipo">
        ⊞ Tipo
      </button>
    </div>

    <!-- Dropdown: valores do filtro atual -->
    <select id="select-filtro"
            class="form-control form-control-sm"
            style="max-width: 180px;">
      <option value="">Todos</option>
    </select>

    <!-- Indicador de modo + botões de modo -->
    <div id="painel-header">
      <div></div>
      <span id="modo-label">MODE: VIEW</span>

      <div class="btn-group btn-group-sm">
        <button class="btn btn-outline-light  modo-btn active" data-modo="view"   title="Visualizar">👁 VER</button>
        <button class="btn btn-outline-warning modo-btn"       data-modo="edit"   title="Editar">✏️ EDITAR</button>
        <button class="btn btn-outline-success modo-btn"       data-modo="new"    title="Novo">＋ NOVO</button>
        <button class="btn btn-outline-danger  modo-btn"       data-modo="delete" title="Excluir">🗑 EXCLUIR</button>
      </div>
    </div>

  </div>

  <!-- ════════════════════════════════════════ -->
  <!--  CONTEÚDO PRINCIPAL                     -->
  <!-- ════════════════════════════════════════ -->
  <div style="display: flex; flex: 1; overflow: hidden;">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <p class="text-muted text-center" style="font-size:.8rem;">Carregando...</p>
    </div>

    <!-- PAINEL DIREITO -->
    <div id="painel-direito">
      <p class="text-muted text-center mt-5" style="font-size:.95rem;">
        ← Selecione uma máquina para ver os detalhes.
      </p>
    </div>

  </div>
</div>

{% endblock %}


<!-- ════════════════════════════════════════════ -->
<!--  JAVASCRIPT                                 -->
<!-- ════════════════════════════════════════════ -->
{% block scripts %}
<script>

// ──────────────────────────────────────────────
// ESTADO GLOBAL
// ──────────────────────────────────────────────
let todasMaquinas  = [];
let filtroAtual    = 'linha';
let modoAtual      = 'view';
let tagSelecionada = null;


// ──────────────────────────────────────────────
// INICIALIZAÇÃO
// ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await carregarMaquinas();
  configurarEventos();
});


// ──────────────────────────────────────────────
// CARREGAR MÁQUINAS
// ──────────────────────────────────────────────
async function carregarMaquinas() {
  try {
    const resp = await fetch('/api/maquinas');
    todasMaquinas = await resp.json();
    atualizarDropdown();
    renderizarSidebar(todasMaquinas);
  } catch (e) {
    document.getElementById('sidebar').innerHTML =
      '<p class="text-danger text-center p-2">Erro ao carregar.</p>';
  }
}


// ──────────────────────────────────────────────
// DROPDOWN
// ──────────────────────────────────────────────
function atualizarDropdown() {
  const select = document.getElementById('select-filtro');
  const campo  = filtroAtual === 'tipo' ? 'tipo' : 'linha';

  const valores = [...new Set(
    todasMaquinas.map(m => m[campo]).filter(Boolean)
  )].sort();

  select.innerHTML = '<option value="">Todos</option>';
  valores.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    select.appendChild(opt);
  });
}


// ──────────────────────────────────────────────
// SIDEBAR
// ──────────────────────────────────────────────
function renderizarSidebar(maquinas) {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';

  if (maquinas.length === 0) {
    sidebar.innerHTML =
      '<p class="text-muted text-center p-3" style="font-size:.8rem;">Nenhuma máquina.</p>';
    return;
  }

  maquinas.forEach(m => {
    const card = document.createElement('div');
    card.className = 'maquina-card';
    card.dataset.tag = m.tag_maquina;

    if (m.tag_maquina === tagSelecionada) {
      card.classList.add('selecionado');
    }

    card.innerHTML = `
      <!-- ÍCONE: descomente quando tiver os arquivos de ícone -->
      <!-- <img src="/static/icons/${m.tipo}.png"
               style="width:42px;height:42px;min-width:42px;border-radius:6px;"
               onerror="this.style.display='none'"> -->

      <div class="maquina-icon-placeholder"></div>
      <div>
        <div style="font-size:.82rem; font-weight:600; color:#1e293b; line-height:1.3;">
          ${m.nome_maquina || '—'}
        </div>
        <div class="maquina-tag">${m.tag_maquina}</div>
      </div>
    `;

    card.addEventListener('click', () => selecionarMaquina(m.tag_maquina));
    sidebar.appendChild(card);
  });
}


// ──────────────────────────────────────────────
// SELECIONAR MÁQUINA
// ──────────────────────────────────────────────
async function selecionarMaquina(tag) {
  tagSelecionada = tag;

  document.querySelectorAll('.maquina-card')
    .forEach(c => c.classList.remove('selecionado'));
  document.querySelector(`.maquina-card[data-tag="${tag}"]`)
    ?.classList.add('selecionado');

  const resp    = await fetch(`/api/maquina/${tag}`);
  const maquina = await resp.json();

  renderizarPainelDireito(maquina);
}


// ──────────────────────────────────────────────
// PAINEL DIREITO
// ──────────────────────────────────────────────
function renderizarPainelDireito(maquina) {
  const painel = document.getElementById('painel-direito');

  // ── MODO: VIEW ────────────────────────────
  if (modoAtual === 'view') {
    painel.innerHTML = `
      <h5 class="font-weight-bold text-dark mb-0">${maquina.tag_maquina}</h5>
      <p class="text-muted mb-3">${maquina.nome_maquina || ''}</p>
      <hr>

      <h6 class="secao-titulo">⚙️ Dados Gerais</h6>
      <table class="table table-bordered table-sm table-detalhes">
        <tbody>
          <tr><th>TAG</th>        <td>${maquina.tag_maquina  || '—'}</td></tr>
          <tr><th>Serial Nº</th>  <td>${maquina.serial_No    || '—'}</td></tr>
          <tr><th>Nome</th>       <td>${maquina.nome_maquina || '—'}</td></tr>
          <tr><th>Tipo</th>       <td>${maquina.tipo         || '—'}</td></tr>
          <tr><th>Comentário</th> <td>${maquina.comentario   || '—'}</td></tr>
        </tbody>
      </table>

      <h6 class="secao-titulo">⚡ Elétrico / Pneumático</h6>
      <table class="table table-bordered table-sm table-detalhes">
        <tbody>
          <tr><th>Tensão (V)</th>      <td>${maquina.tensao_v      || '—'}</td></tr>
          <tr><th>Frequência (Hz)</th> <td>${maquina.frequencia_hz || '—'}</td></tr>
          <tr><th>Potência</th>
              <td>${maquina.potencia
                    ? maquina.potencia + ' ' + (maquina.unidade_potencia || '')
                    : '—'}</td></tr>
          <tr><th>Pressão</th>
              <td>${maquina.pressao
                    ? maquina.pressao + ' ' + (maquina.unidade_pressao || '')
                    : '—'}</td></tr>
        </tbody>
      </table>

      <h6 class="secao-titulo">🖥️ Especificações de PCB</h6>
      <table class="table table-bordered table-sm table-detalhes">
        <tbody>
          <tr><th>Peso máx. PCB (kg)</th> <td>${maquina.max_pcb_peso_kg     || '—'}</td></tr>

          <tr><th>Larg. máx. (mm)</th>    <td>${maquina.max_pcb_larg_mm     || '—'}</td></tr>

  }

  // ── MODO: NEW ─────────────────────────────
  if (modoAtual === 'new') {

      <hr>

      <h6 class="secao-titulo">⚙️ Dados Gerais</h6>
      <div class="form-row">
        <div class="form-group col-md-4">
          <label>TAG <span class="text-danger">*</span></label>

        </div>
        <div class="form-group col-md-4">

        <div class="form-group col-md-4">

        </div>
      </div>

      <div class="form-row">
        <div class="form-group col-md-8">
          <label>Nome da Máquina <span class="text-danger">*</span></label>

        </div>
      </div>

      <div class="form-group">

        <textarea id="f-comentario" class="form-control form-control-sm" rows="2"></textarea>
      </div>

      <h6 class="secao-titulo">⚡ Elétrico / Pneumático</h6>
      <div class="form-row">
        <div class="form-group col-md-4">

          <input type="number" id="f-tensao" class="form-control form-control-sm">
        </div>
        <div class="form-group col-md-4">
          <label>Frequência (Hz)</label>
          <input type="number" id="f-frequencia" class="form-control form-control-sm">
        </div>
      </div>

      <div class="form-row">

          <input type="number" id="f-potencia" class="form-control form-control-sm">
        </div>
        <div class="form-group col-md-4">
          <label>Unidade Potência</label>
          <select id="f-unidade-potencia" class="form-control form-control-sm">

      <div class="form-row">

        </div>

          <input type="number" id="f-pcb-comp-min" class="form-control form-control-sm">
        </div>
        <div class="form-group col-md-4">
          <label>Larg. mín. (mm) <span class="text-danger">*</span></label>
          <input type="number" id="f-pcb-larg-min" class="form-control form-control-sm">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group col-md-4">
          <label>Comp. máx. (mm) <span class="text-danger">*</span></label>
          <input type="number" id="f-pcb-comp-max" class="form-control form-control-sm">
        </div>
        <div class="form-group col-md-4">
          <label>Larg. máx. (mm) <span class="text-danger">*</span></label>
          <input type="number" id="f-pcb-larg-max" class="form-control form-control-sm">
        </div>
        <div class="form-group col-md-4">
          <label>Altura limite (mm) <span class="text-danger">*</span></label>
          <input type="number" id="f-pcb-altura" class="form-control form-control-sm">
        </div>
      </div>

      <h6 class="secao-titulo">📐 Dimensões Físicas</h6>
      <div class="form-row">
        <div class="form-group col-md-3">
          <label>Peso (kg)</label>
          <input type="number" id="f-peso" class="form-control form-control-sm">
        </div>
        <div class="form-group col-md-3">
          <label>Comprimento (mm)</label>
          <input type="number" id="f-comp" class="form-control form-control-sm">
        </div>
        <div class="form-group col-md-3">
          <label>Largura (mm)</label>
          <input type="number" id="f-larg" class="form-control form-control-sm">
        </div>
        <div class="form-group col-md-3">
          <label>Altura (mm)</label>
          <input type="number" id="f-alt" class="form-control form-control-sm">
        </div>
      </div>

      <h6 class="secao-titulo">📍 Localização</h6>
      <div class="form-row">
        <div class="form-group col-md-4">
          <label>Linha</label>
          <input type="number" id="f-linha" class="form-control form-control-sm">
        </div>
        <div class="form-group col-md-4">
          <label>Posição</label>
          <input type="number" id="f-posicao" class="form-control form-control-sm"
                 placeholder="Deixe vazio para adicionar ao final">
        </div>
      </div>

      <hr>
      <div id="form-feedback" class="mb-3"></div>

      <button id="btn-salvar" class="btn btn-success btn-block font-weight-bold">
        💾 Cadastrar Máquina
      </button>
    `;

    document.getElementById('btn-salvar')
      .addEventListener('click', salvarNovaMaquina);
    return;
  }

  // ── MODO: EDIT ────────────────────────────
  if (modoAtual === 'edit') {
    painel.innerHTML = `
      <h5 class="font-weight-bold text-dark mb-3">✏️ Editando: ${maquina.tag_maquina}</h5>
      <hr>

      <h6 class="secao-titulo">⚙️ Dados Gerais</h6>
      <div class="form-row">
        <div class="form-group col-md-4">

                 value="${maquina.serial_No || ''}">

                 value="${maquina.tipo || ''}">

      <div class="form-row">
        <div class="form-group col-md-8">

                 value="${maquina.nome_maquina || ''}">

                 value="${maquina.frequencia_hz || ''}">

                 value="${maquina.potencia || ''}">
        </div>
        <div class="form-group col-md-4">
          <label>Unidade Potência</label>
          <select id="e-unidade-potencia" class="form-control form-control-sm">
            <option value="">—</option>

      <div class="form-row">

          <input type="number" id="e-pressao" class="form-control form-control-sm"

            <option value="bar" ${maquina.unidade_pressao === 'bar' ? 'selected' : ''}>bar</option>
            <option value="kPa" ${maquina.unidade_pressao === 'kPa' ? 'selected' : ''}>kPa</option>

                 value="${maquina.min_pcb_comp_mm || ''}">

        <div class="form-group col-md-4">
          <label>Larg. mín. (mm) <span class="text-danger">*</span></label>
          <input type="number" id="e-pcb-larg-min" class="form-control form-control-sm"
                 value="${maquina.min_pcb_larg_mm || ''}">

      </div>

      <div class="form-row">
        <div class="form-group col-md-4">
          <label>Comp. máx. (mm) <span class="text-danger">*</span></label>
          <input type="number" id="e-pcb-comp-max" class="form-control form-control-sm"
                 value="${maquina.max_pcb_comp_mm || ''}">
        </div>
        <div class="form-group col-md-4">
          <label>Larg. máx. (mm) <span class="text-danger">*</span></label>
          <input type="number" id="e-pcb-larg-max" class="form-control form-control-sm"
                 value="${maquina.max_pcb_larg_mm || ''}">

        <div class="form-group col-md-4">
          <label>Altura limite (mm) <span class="text-danger">*</span></label>

      <div class="form-row">
        <div class="form-group col-md-3">
          <label>Peso (kg)</label>
          <input type="number" id="e-peso" class="form-control form-control-sm"
                 value="${maquina.peso_maquina || ''}">
        </div>
        <div class="form-group col-md-3">
          <label>Comprimento (mm)</label>
          <input type="number" id="e-comp" class="form-control form-control-sm"
                 value="${maquina.comp_maquina || ''}">
        </div>
        <div class="form-group col-md-3">

        <div class="form-group col-md-3">
          <label>Altura (mm)</label>
          <input type="number" id="e-alt" class="form-control form-control-sm"

      <h6 class="secao-titulo">📍 Localização</h6>

        <div class="form-group col-md-4">
          <label>Posição</label>
          <input type="number" id="e-posicao" class="form-control form-control-sm"
                 value="${maquina.posicao || ''}">
        </div>
      </div>

      <hr>
      <div id="form-feedback" class="mb-3"></div>

      <button id="btn-salvar-edicao" class="btn btn-warning btn-block font-weight-bold">
        💾 Salvar Alterações
      </button>
    `;

    document.getElementById('btn-salvar-edicao')
      .addEventListener('click', () => salvarEdicao(maquina.tag_maquina));
    return;
  }

  // ── MODO: DELETE ──────────────────────────
  if (modoAtual === 'delete') {
    painel.innerHTML = `
      <div class="text-center mt-5">
        <h5 class="font-weight-bold text-danger mb-1">🗑️ Excluir Máquina</h5>
        <p class="text-muted mb-4">Esta ação não pode ser desfeita.</p>

        <div class="card border-danger mx-auto" style="max-width: 400px;">
          <div class="card-body">
            <p class="mb-1"><strong>TAG:</strong> ${maquina.tag_maquina}</p>
            <p class="mb-3"><strong>Nome:</strong> ${maquina.nome_maquina || '—'}</p>
            <hr>
            <p class="text-danger font-weight-bold">
              Tem certeza que deseja excluir esta máquina?
            </p>

            <div id="form-feedback" class="mb-3"></div>

            <div class="d-flex justify-content-center" style="gap: 12px;">
              <button id="btn-cancelar-delete" class="btn btn-secondary font-weight-bold">
                ✖ Cancelar
              </button>
              <button id="btn-confirmar-delete" class="btn btn-danger font-weight-bold">
                🗑️ Confirmar Exclusão
              </button>
            </div>
          </div>
        </div>
      </div>
    `;

    document.getElementById('btn-cancelar-delete')
      .addEventListener('click', () => {
        modoAtual = 'view';
        document.getElementById('modo-label').textContent = 'MODE: VIEW';
        document.querySelectorAll('.modo-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-modo="view"]').classList.add('active');
        selecionarMaquina(maquina.tag_maquina);
      });

    document.getElementById('btn-confirmar-delete')
      .addEventListener('click', () => confirmarDelete(maquina.tag_maquina));
    return;
  }
}


// ──────────────────────────────────────────────
// SALVAR NOVA MÁQUINA
// ──────────────────────────────────────────────
async function salvarNovaMaquina() {
  const feedback = document.getElementById('form-feedback');

  const dados = {
    tag_maquina:         document.getElementById('f-tag').value.trim(),
    serial_No:           document.getElementById('f-serial').value.trim()    || null,
    nome_maquina:        document.getElementById('f-nome').value.trim(),
    tipo:                document.getElementById('f-tipo').value.trim(),
    tensao_v:            document.getElementById('f-tensao').value            || null,
    frequencia_hz:       document.getElementById('f-frequencia').value        || null,
    potencia:            document.getElementById('f-potencia').value          || null,
    unidade_potencia:    document.getElementById('f-unidade-potencia').value  || null,
    pressao:             document.getElementById('f-pressao').value           || null,
    unidade_pressao:     document.getElementById('f-unidade-pressao').value   || null,
    comentario:          document.getElementById('f-comentario').value.trim() || null,
    max_pcb_peso_kg:     document.getElementById('f-pcb-peso').value          || null,
    min_pcb_comp_mm:     document.getElementById('f-pcb-comp-min').value      || null,
    min_pcb_larg_mm:     document.getElementById('f-pcb-larg-min').value      || null,
    max_pcb_comp_mm:     document.getElementById('f-pcb-comp-max').value      || null,
    max_pcb_larg_mm:     document.getElementById('f-pcb-larg-max').value      || null,
    max_height_limit_mm: document.getElementById('f-pcb-altura').value        || null,
    peso_maquina:        document.getElementById('f-peso').value              || null,
    comp_maquina:        document.getElementById('f-comp').value              || null,
    larg_maquina:        document.getElementById('f-larg').value              || null,
    alt_maquina:         document.getElementById('f-alt').value               || null,
    linha:               document.getElementById('f-linha').value             || null,
    posicao:             document.getElementById('f-posicao').value           || null,
  };

  if (!dados.tag_maquina || !dados.nome_maquina || !dados.tipo ||
      !dados.max_pcb_peso_kg || !dados.min_pcb_comp_mm || !dados.min_pcb_larg_mm ||
      !dados.max_pcb_comp_mm || !dados.max_pcb_larg_mm || !dados.max_height_limit_mm) {
    feedback.innerHTML = `
      <div class="alert alert-danger py-2">
        ⚠️ Preencha todos os campos obrigatórios:
        <strong>TAG, Nome, Tipo e todas as Especificações de PCB</strong>.
      </div>`;
    return;
  }

  try {
    const resp = await fetch('/api/maquina/nova', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(dados)
    });
    const resultado = await resp.json();

    if (resultado.sucesso) {
      modoAtual = 'view';
      document.getElementById('modo-label').textContent = 'MODE: VIEW';
      document.querySelectorAll('.modo-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-modo="view"]').classList.add('active');

      await carregarMaquinas();
      await selecionarMaquina(dados.tag_maquina); // ← abre a máquina recém criada

      const aviso = document.createElement('div');
      aviso.className = 'alert alert-success py-2 mx-3 mt-2';
      aviso.textContent = `✅ ${resultado.mensagem}`;
      document.getElementById('painel-direito').prepend(aviso);
      setTimeout(() => aviso.remove(), 3000);

    } else {
      feedback.innerHTML = `
        <div class="alert alert-danger py-2">❌ ${resultado.mensagem}</div>`;
    }
  } catch (e) {
    feedback.innerHTML = `
      <div class="alert alert-danger py-2">❌ Erro de comunicação com o servidor.</div>`;
  }
}

      method:  'POST',
      headers: { 'Content-Type': 'application/json' }
    });
    const resultado = await resp.json();

    if (resultado.sucesso) {
      tagSelecionada = null;
      modoAtual = 'view';
      document.getElementById('modo-label').textContent = 'MODE: VIEW';
      document.querySelectorAll('.modo-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-modo="view"]').classList.add('active');

      document.getElementById('painel-direito').innerHTML = `
        <div class="alert alert-success mt-4 text-center">

      await carregarMaquinas();

      feedback.innerHTML = `

  }
}


// ──────────────────────────────────────────────
// FILTRAR
// ──────────────────────────────────────────────
function filtrarMaquinas() {
  const valorRaw = document.getElementById('select-filtro').value;
  const campo    = filtroAtual === 'tipo' ? 'tipo' : 'linha';

  const valor = (filtroAtual === 'linha' && valorRaw !== '')
    ? Number(valorRaw)
    : valorRaw;

  const filtradas = valor
    ? todasMaquinas.filter(m => m[campo] === valor)
    : todasMaquinas;

  renderizarSidebar(filtradas);
}


// ──────────────────────────────────────────────
// EVENTOS
// ──────────────────────────────────────────────
function configurarEventos() {

  // Botões de filtro: Linha e Tipo
  document.querySelectorAll('.filtro-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filtroAtual = btn.dataset.filtro;

      document.querySelectorAll('.filtro-btn')
        .forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      atualizarDropdown();
      document.getElementById('select-filtro').value = '';
      filtrarMaquinas();
    });
  });

  // Dropdown
  document.getElementById('select-filtro')
    .addEventListener('change', filtrarMaquinas);

  // Botões de modo
  document.querySelectorAll('.modo-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      modoAtual = btn.dataset.modo;

      const labels = { view: 'VIEW', edit: 'EDIT', new: 'NEW', delete: 'DELETE' };
      document.getElementById('modo-label').textContent = `MODE: ${labels[modoAtual]}`;

      document.querySelectorAll('.modo-btn')
        .forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // Modo NEW: limpa seleção e abre formulário vazio
      if (modoAtual === 'new') {
        tagSelecionada = null;
        document.querySelectorAll('.maquina-card')
          .forEach(c => c.classList.remove('selecionado'));
        renderizarPainelDireito({});
        return;
      }

      if (tagSelecionada) selecionarMaquina(tagSelecionada);
    });
  });

}

</script>
